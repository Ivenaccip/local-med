name: local_med
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # Embedding on-device (reemplaza a fonnx)
  flutter_embedder: ^0.1.6

  flutter_rust_bridge: 2.11.1

  onnxruntime: ^1.4.1

  # Persistencia local
  sqlite3: ^3.3.2
  path_provider: ^2.1.5

  # State management
  flutter_riverpod: ^3.3.1

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/model.onnx
    - assets/models/tokenizer.json
    - assets/data/vectors.json
    - assets/data/enriquecimientos.json
    - assets/data/golden_test.json